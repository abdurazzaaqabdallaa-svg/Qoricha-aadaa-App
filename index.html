
<!DOCTYPE html>
<html lang="om">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qoricha Aadaa App</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f9f4; color: #2d5a27; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1b4332; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #2d5a27; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #40916c; }
        .result-card { background: #e9f5db; padding: 15px; border-left: 5px solid #2d5a27; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Qoricha Aadaa</h1>
    <p>Maqaa biqiltuu barreessi:</p>
    <input type="text" id="medName" placeholder="Fkn: Damakesee, Qeeltoo...">
    <button onclick="barbaadi()">Faayidaa Barbaadi</button>

    <div id="result" class="result-card">
        <h3 id="resTitle"></h3>
        <p id="resDesc"></p>
    </div>
</div>

<script>
    const qorichoota = {
        "damakesee": "Qufaa fi dhukkubbii mataatiif tajaajila.",
        "qeeltoo": "Madaa gogaa fi rifeensaaf gaariidha.",
        "hiddii": "Dhukkubbii ilkaaniif akka qorichaatti tajaajila.",
        "adjoo": "Dhukkubbii garaa fi dhibee kosiitiif qorichadha."
    };

    function barbaadi() {
        let maqaa = document.getElementById('medName').value.toLowerCase();
        let resultDiv = document.getElementById('result');
        let resTitle = document.getElementById('resTitle');
        let resDesc = document.getElementById('resDesc');

        if (qorichoota[maqaa]) {
            resultDiv.style.display = "block";
            resTitle.innerText = maqaa.toUpperCase();
            resDesc.innerText = qorichoota[maqaa];
        } else {
            alert("Odeeffannoon biqiltuu kanaa hin jiru. Maaloo lammata yaali!");
        }
    }
</script>

</body>
</html>
