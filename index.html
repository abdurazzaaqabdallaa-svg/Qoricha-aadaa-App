    <style>
    :root {
        --primary-color: #2e7d32; /* Magariisa qoricha aadaa */
        --secondary-color: #f1f8e9;
        --text-color: #333;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 0;
        color: var(--text-color);
    }

    header {
        background: var(--primary-color);
        color: white;
        padding: 20px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
    }

    .search-container {
        padding: 20px;
        display: flex;
        justify-content: center;
    }

    #searchInput {
        width: 90%;
        max-width: 400px;
        padding: 15px;
        border: 2px solid var(--primary-color);
        border-radius: 30px;
        outline: none;
        font-size: 16px;
    }

    .container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        transition: 0.3s;
        border-left: 5px solid var(--primary-color);
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    .card h3 {
        color: var(--primary-color);
        margin-top: 0;
    }

    .tag {
        display: inline-block;
        background: var(--secondary-color);
        color: var(--primary-color);
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: bold;
    }
    </style>
</head>
<body>

<div class="container">
    <h1>Qoricha Aadaa</h1>
    <p>Maqaa biqiltuu barreessi:</p>
    <input type="text" id="medName" placeholder="Fkn: Damakesee, Qeeltoo...">
    <button onclick="barbaadi()">Faayidaa Barbaadi</button>
    
    <div id="result" class="result-card">
        <h3 id="resTitle"></h3>
        <p id="resDesc"></p>
    </div>

    <div style="margin-top: 40px; padding: 10px; line-height: 1.8; color: #333;">

        <article>
            <h2 style="color: #2e7d32;">Qoricha Aadaa: Humna Durii</h2>
            <p>Addunyaan keenya gara dhaloota teeknoolojii ammayyaatti yoo ceetu...</p>
            </article>

        <p><em>Barreeffamoota kee warra kaan (Habasudaa, Coding, kkf) hunda koodii kee isa duraa irraa 'copy' gochuun as keessa galchuu dandeessa.</em></p>

    </div>
</div>

<script>
    const qorichoota = {
        "damakesee": "Qufaa fi dhukkubbii mataatiif tajaajila.",
        "qeeltoo": "Madaa gogaa fi rifeensaaf gaariidha.",
        "hiddii": "Dhukkubbii ilkaaniif akka qorichaatti tajaajila.",
        "adjoo": "Dhukkubbii garaa fi dhibee kosiitiif qorichadha."
    };

    function barbaadi() {
        let maqaa = document.getElementById('medName').value.toLowerCase().trim();
        let resultDiv = document.getElementById('result');
        let resTitle = document.getElementById('resTitle');
        let resDesc = document.getElementById('resDesc');

        if (qorichoota[maqaa]) {
            resultDiv.style.display = "block";
            resTitle.innerText = maqaa.toUpperCase();
            resDesc.innerText = qorichoota[maqaa];
        } else {
            alert("Odeeffannoon biqiltuu kanaa hin jiru. Maaloo lammata yaali!");
        }

}
